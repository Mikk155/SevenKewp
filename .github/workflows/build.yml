name: Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'

# Build every time VERSION is changed
env:
  VERSION: 1.0

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Installing Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Release
        env:
          TOKEN: ${{ secrets.TOKEN }}
          VERSION: ${{ env.VERSION }}
        run: python3 release.py "${{ env.VERSION }}" linux

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Installing Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Release
        env:
          TOKEN: ${{ secrets.TOKEN }}
          VERSION: ${{ env.VERSION }}
        run: python release.py "${{ env.VERSION }}" windows